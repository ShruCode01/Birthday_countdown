<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎂 Magical Birthday Countdown</title>
 <link rel="stylesheet" href="birth.css">
</head>

<body>

<button class="toggle" onclick="toggleMode()">🌙 / ☀️</button>

<div id="party">🎉 Party Time! 🎂🎈</div>

<div class="container">

<h1>🎉 Birthday Countdown🎉</h1>

<!-- Name Input -->
<input type="text" id="name" placeholder="Enter Your Name ✨">

<img id="photo">

<div class="countdown" id="countdown">Waiting...</div>

<div class="input-box">
  <input type="number" id="day" placeholder="DD">
  <input type="number" id="month" placeholder="MM">
</div>

<input type="file" accept="image/*" onchange="loadPhoto(event)">

<div>
<button onclick="start()">Start 🎂</button>
<button onclick="playMusic()">🎵 Music</button>
</div>

</div>
<script src="birth.js"></script>


</body>
</html>
